# robot_localization EKF 参数骨架 —— 阶段 2 调参
# 输入：/odom_raw（轮式里程计）+ /imu/data_raw（MPU6050）
# 输出：/odometry/filtered 及 odom→base_link TF
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom_raw
    odom0_config: [false, false, false,   # x y z
                   false, false, false,   # roll pitch yaw
                   true,  true,  false,   # vx vy vz
                   false, false, true,    # vroll vpitch vyaw
                   false, false, false]   # ax ay az

    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,     # 仅用 yaw 角速度
                  true,  false, false]    # + x 向加速度
    imu0_remove_gravitational_acceleration: true
